<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#e8f5e9"/>

  <!-- Simple cute cloud -->
  <g transform="translate(256, 260)">
    <!-- Cloud body - overlapping circles -->
    <circle cx="-60" cy="20" r="65" fill="#4caf50"/>
    <circle cx="20" cy="-10" r="85" fill="#4caf50"/>
    <circle cx="90" cy="20" r="60" fill="#4caf50"/>
    <circle cx="15" cy="30" r="70" fill="#4caf50"/>

    <!-- Cloud bottom flat part -->
    <rect x="-120" y="30" width="230" height="45" rx="22" fill="#4caf50"/>

    <!-- Cute face - left eye -->
    <circle cx="-15" cy="10" r="8" fill="#ffffff"/>
    <circle cx="-13" cy="12" r="4" fill="#2e7d32"/>

    <!-- Cute face - right eye -->
    <circle cx="45" cy="10" r="8" fill="#ffffff"/>
    <circle cx="47" cy="12" r="4" fill="#2e7d32"/>

    <!-- Smile -->
    <path d="M 5 30 Q 15 45 25 30" stroke="#2e7d32" stroke-width="4" fill="none" stroke-linecap="round"/>

    <!-- Blush left -->
    <ellipse cx="-30" cy="30" rx="12" ry="8" fill="#81c784" opacity="0.7"/>

    <!-- Blush right -->
    <ellipse cx="60" cy="30" rx="12" ry="8" fill="#81c784" opacity="0.7"/>
  </g>
</svg>
