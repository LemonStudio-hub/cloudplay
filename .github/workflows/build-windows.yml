name: Build Windows MSIX

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-msix:
    name: Build MSIX (${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64]
        # 可扩展: arch: [x64, arm64]
    defaults:
      run:
        working-directory: mcgo-app

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      # ── Node.js + pnpm ──
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: mcgo-app/pnpm-lock.yaml

      # ── Rust toolchain ──
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # ── Rust 缓存 ──
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: mcgo-app/src-tauri -> target

      # ── 下载 CloudflareSpeedTest ──
      - name: Download CloudflareSpeedTest
        shell: pwsh
        run: |
          $binDir = "mcgo-app/src-tauri/binaries"
          $cfstExe = "$binDir/CloudflareSpeedTest-x86_64-pc-windows-msvc.exe"

          if (Test-Path $cfstExe) {
            Write-Host "CloudflareSpeedTest already exists, skipping download"
            exit 0
          }

          Write-Host "Downloading CloudflareSpeedTest..."
          $url = "https://github.com/XIU2/CloudflareSpeedTest/releases/latest/download/cfst_windows_amd64.zip"
          $zipPath = "$env:TEMP/cfst_windows_amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile $zipPath -UseBasicParsing

          $extractDir = "$env:TEMP/cfst_extract"
          Expand-Archive -Path $zipPath -DestinationPath $extractDir -Force

          $srcExe = Get-ChildItem -Path $extractDir -Filter "cfst.exe" -Recurse | Select-Object -First 1
          if (-not $srcExe) {
            Write-Error "cfst.exe not found in archive"
            exit 1
          }

          Copy-Item $srcExe.FullName $cfstExe
          Write-Host "CloudflareSpeedTest installed: $cfstExe"
          (Get-Item $cfstExe).Length / 1MB | ForEach-Object { Write-Host "  Size: $([math]::Round($_, 1)) MB" }

          # Cleanup
          Remove-Item $zipPath -Force -ErrorAction SilentlyContinue
          Remove-Item $extractDir -Recurse -Force -ErrorAction SilentlyContinue

      # ── 安装前端依赖 ──
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # ── 安装 Tauri CLI（带缓存） ──
      - name: Cache Tauri CLI
        id: cache-tauri-cli
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-tauri.exe
          key: tauri-cli-2-${{ runner.os }}
      - name: Install Tauri CLI
        if: steps.cache-tauri-cli.outputs.cache-hit != 'true'
        run: cargo install tauri-cli --version "^2"

      # ── 构建 Tauri 应用（包含前端构建） ──
      - name: Build Tauri app
        run: cargo tauri build --target x86_64-pc-windows-msvc
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      # ── 准备 MSIX 内容目录 ──
      - name: Prepare MSIX content
        shell: pwsh
        run: |
          $contentDir = "target\msix\content_${{ matrix.arch }}"
          New-Item -ItemType Directory -Path $contentDir -Force

          $releaseDir = "src-tauri\target\x86_64-pc-windows-msvc\release"

          # 复制主程序（Cargo 包名是 cloudplay-app）
          $exePath = "$releaseDir\cloudplay-app.exe"
          if (-not (Test-Path $exePath)) {
            Write-Error "Executable not found: $exePath"
            exit 1
          }
          Copy-Item $exePath "$contentDir\CloudPlay.exe"

          # 复制 cloudflared sidecar 二进制
          $sidecarPath = "$releaseDir\cloudflared.exe"
          if (-not (Test-Path $sidecarPath)) {
            Write-Error "Sidecar binary not found: $sidecarPath"
            exit 1
          }
          Copy-Item $sidecarPath "$contentDir\cloudflared.exe"

          # 复制 CloudflareSpeedTest sidecar 二进制
          $cfstPath = "$releaseDir\CloudflareSpeedTest.exe"
          if (Test-Path $cfstPath) {
            Copy-Item $cfstPath "$contentDir\CloudflareSpeedTest.exe"
          } else {
            Write-Host "Warning: CloudflareSpeedTest.exe not found, skipping"
          }

          # 复制图标资源
          New-Item -ItemType Directory -Path "$contentDir\Assets" -Force
          Copy-Item "src-tauri\gen\windows\Assets\*" "$contentDir\Assets\" -Recurse

          # 验证内容
          Write-Host "MSIX content directory:"
          Get-ChildItem $contentDir -Recurse | ForEach-Object {
            Write-Host "  $($_.FullName.Replace($contentDir, '.'))  ($([math]::Round($_.Length/1MB, 1)) MB)"
          }

      # ── 生成 AppxManifest.xml ──
      - name: Generate AppxManifest.xml
        shell: pwsh
        run: |
          $contentDir = "target\msix\content_${{ matrix.arch }}"
          $template = Get-Content "src-tauri\gen\windows\AppxManifest.xml.template" -Raw
          $config = Get-Content "src-tauri\gen\windows\bundle.config.json" | ConvertFrom-Json
          $tauriConf = Get-Content "src-tauri\tauri.conf.json" | ConvertFrom-Json

          $manifest = $template `
            -replace '\{\{identifier\}\}', $tauriConf.identifier `
            -replace '\{\{publisher\}\}', $config.publisher `
            -replace '\{\{version\}\}', ($tauriConf.version + ".0") `
            -replace '\{\{arch\}\}', '${{ matrix.arch }}' `
            -replace '\{\{displayName\}\}', $tauriConf.productName `
            -replace '\{\{publisherDisplayName\}\}', $config.publisherDisplayName `
            -replace '\{\{description\}\}', "CloudPlay - LAN game remote multiplayer client" `
            -replace '\{\{exeName\}\}', "CloudPlay.exe"

          $manifest | Out-File -FilePath "$contentDir\AppxManifest.xml" -Encoding UTF8
          Write-Host "AppxManifest.xml generated successfully"

      # ── 创建 MSIX 包 ──
      - name: Create MSIX package
        shell: pwsh
        run: |
          # Windows runner 自带 MakeAppx.exe
          $sdkRoot = "${env:ProgramFiles(x86)}\Windows Kits\10\bin"
          $makeAppx = Get-ChildItem -Path $sdkRoot -Recurse -Filter "MakeAppx.exe" |
            Where-Object { $_.FullName -match "x64" } |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $makeAppx) {
            # Fallback: try PATH
            $makeAppx = (Get-Command MakeAppx.exe -ErrorAction SilentlyContinue).Source
          }

          if (-not $makeAppx) {
            Write-Error "MakeAppx.exe not found"
            exit 1
          }

          Write-Host "Using MakeAppx: $makeAppx"
          $contentDir = "target\msix\content_${{ matrix.arch }}"
          $msixFile = "target\msix\CloudPlay_${{ matrix.arch }}.msix"

          & $makeAppx pack /d $contentDir /p $msixFile /o
          if ($LASTEXITCODE -ne 0) {
            Write-Error "MakeAppx failed with exit code $LASTEXITCODE"
            exit 1
          }

          Write-Host "MSIX created: $msixFile"

      # ── 签名（仅 tag 触发时） ──
      - name: Sign MSIX
        if: startsWith(github.ref, 'refs/tags/v') && env.SIGNING_CERTIFICATE != ''
        shell: pwsh
        env:
          SIGNING_CERTIFICATE: ${{ secrets.SIGNING_CERTIFICATE_BASE64 }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          # 解码 PFX 证书
          $pfxBytes = [Convert]::FromBase64String($env:SIGNING_CERTIFICATE)
          $pfxPath = Join-Path $env:TEMP "signing.pfx"
          [IO.File]::WriteAllBytes($pfxPath, $pfxBytes)

          $sdkRoot = "${env:ProgramFiles(x86)}\Windows Kits\10\bin"
          $signtool = Get-ChildItem -Path $sdkRoot -Recurse -Filter "signtool.exe" |
            Where-Object { $_.FullName -match "x64" } |
            Select-Object -First 1 -ExpandProperty FullName

          $msixFile = "target\msix\CloudPlay_${{ matrix.arch }}.msix"
          & $signtool sign /fd SHA256 /a /f $pfxPath /p $env:SIGNING_PASSWORD $msixFile

          # 清理
          Remove-Item $pfxPath -Force

      # ── 上传产物 ──
      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: CloudPlay-${{ matrix.arch }}.msix
          path: mcgo-app/target/msix/CloudPlay_${{ matrix.arch }}.msix
          if-no-files-found: error
          retention-days: 30

  # ── Release 时自动发布 ──
  release:
    name: Create Release
    needs: build-msix
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.msix
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
