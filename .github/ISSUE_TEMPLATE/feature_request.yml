name: Feature Request
description: Suggest a new feature for CloudPlay
title: "[Feature]: "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a new feature! 

        Please fill out the information below to help us understand your request.

  - type: textarea
    id: problem
    attributes:
      label: Problem Description
      description: A clear and concise description of the problem this feature would solve.
      placeholder: |
        I'm always frustrated when [...]
        I wish I could [...]
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: A clear and concise description of what you want to happen.
      placeholder: |
        I would like CloudPlay to [...]
        The feature should [...]
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: A clear and concise description of any alternative solutions or features you've considered.
      placeholder: |
        I've considered [...]
        Another option would be [...]
    validations:
      required: false

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Describe the use case for this feature.
      placeholder: |
        As a user, I want to [...]
        This would help me [...]
    validations:
      required: false

  - type: textarea
    id: mockups
    attributes:
      label: Mockups / Examples
      description: If applicable, add mockups or examples to help illustrate the feature.
      placeholder: Drag and drop images here...

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to you?
      options:
        - Low - Nice to have
        - Medium - Would improve my workflow
        - High - Critical for my use case
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component does this feature affect?
      options:
        - Backend (Worker)
        - Desktop Client (Tauri)
        - Website
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the feature request here.
      placeholder: Any other relevant information...

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I have searched for existing feature requests
          required: true
        - label: I have provided all the requested information
          required: true
